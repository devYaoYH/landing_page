<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Polar City — Stage 1 Demo</title>
  <style>
    /* body bg must be transparent — canvas at z-index:-1 sits behind it. */
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      font: 12px/1.3 system-ui, sans-serif; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.4);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">Polar City — Stage 1 (static iso render)</div>
  <script type="module">
    import { mountPolarCity } from './main.js';
    window.polarCity = await mountPolarCity(document.body, {
      asBackground: true,
    });
  </script>
</body>
</html>
