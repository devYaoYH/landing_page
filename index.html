<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Cloud Watcher</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="landing.css">

    <!-- Animation library -->
    <script src="CanvasAnimation.js"></script>
    <script src="DemoAnimationObject.js"></script>
    <script src="CloudMaker.js"></script>
    <script src="GameOfLife.js"></script>

    <!-- Landing-page logic (loaded in head so globals + onclick handlers are
         defined before the body's inline handlers can fire) -->
    <script src="js/landing/cloud-scene.js"></script>
    <script src="js/landing/hero-intro.js"></script>
    <script src="js/landing/expand-page.js"></script>
    <script src="js/landing/nav.js"></script>
    <script src="js/landing/debug-actions.js"></script>

    <script>
      console.log(`
      Copyright © 2021 Yao Yiheng. All Rights Reserved

      [SPACE] => Toggle Animations (pause/unpause)
      [CLICK] => {
          cloud: dissapate them!
      }
      [CONSOLE CMD] => {
          'SHOW_DEMO = true': render animation demo object, a shape that orbits around mouse location.
          'flag_enable_night_mode = true': overlay a night-time mode.
      }
      `);
    </script>
  </head>
  <body>
    <div id="hero">
      <div class="callout">
        <canvas id="canvas" width="100%" height="100%"></canvas>
        <h1 id="headline" class="nowrap" style="position:absolute;">...</h1>
      </div>
      <button id="scroll-arrow" onclick="expandPage()" aria-label="Explore">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>

    <div id="blog">
      <div id="polar-city-bg"></div>

      <div data-component="blog-nav"></div>
      <div data-page="blog-about"></div>
      <div data-page="blog-research"></div>
      <div data-page="blog-projects"></div>
      <div data-page="blog-writing"></div>
      <div data-component="blog-footer"></div>
    </div>

    <!-- Claude Approved stamp — kept as component, rendered on a different page -->
    <!--
    <div class="stamp-sticker" onclick="this.classList.toggle('stamp-open')">
      ...
    </div>
    -->
    <div data-component="debug-toolbar"></div>

    <!-- Inject HTML page fragments. Runs after placeholders are in DOM; the
         long typewriter intro gives the fetches plenty of time to finish
         before the user reveals the blog. -->
    <script src="js/landing/page-loader.js"></script>
    <script type="module" src="js/landing/research-render.js"></script>
    <script type="module" src="js/landing/projects-render.js"></script>
    <script type="module" src="js/landing/writing-render.js"></script>

    <script type="module">
      import { mountPolarCity, preloadAssets } from './js/polar_city/main.js';

      const POLAR_CITY_OPTS = {
        assetsBase: 'img/polar_city',
        poseScalesUrl: '/js/polar_city/pose_scales.json',
        asBackground: false,
        backgroundAlpha: 0,
        scale: 0.5,
      };

      const assetsReady = preloadAssets(POLAR_CITY_OPTS);

      // Mount target is #polar-stage — a layer inserted behind the cloud
      // canvas during the wipe transition (see expandPage).
      window.__mountPolarCity = () =>
        assetsReady.then(() => mountPolarCity('#polar-stage', POLAR_CITY_OPTS));
    </script>
  </body>
</html>
