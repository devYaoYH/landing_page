    <!-- Reveal the blog only once every fragment is injected (and fonts have
         had a moment to settle) so content fades in as one piece instead of
         fragments popping in one by one. Registered after the render modules
         so their fragmentsReady callbacks have already populated the lists. -->
    <script type="module">
      const fontsSettled = Promise.race([
        document.fonts.ready,
        new Promise((resolve) => setTimeout(resolve, 800)),
      ]);
      Promise.all([window.fragmentsReady, fontsSettled]).then(() => {
        requestAnimationFrame(() => {
          document.getElementById('blog').classList.add('visible');
        });
      });
    </script>

    <script type="module">
      import { mountPolarCity, preloadAssets } from './js/polar_city/main.js';

      const POLAR_CITY_OPTS = {
        assetsBase: 'img/polar_city',
        poseScalesUrl: '/js/polar_city/pose_scales.json',
        asBackground: false,
        backgroundAlpha: 0,
        scale: 0.5,
      };

      const mount = () => preloadAssets(POLAR_CITY_OPTS).then(() => {
        mountPolarCity('#polar-stage', POLAR_CITY_OPTS);
        const stage = document.getElementById('polar-stage');
        const observer = new MutationObserver(() => {
          const canvas = stage.querySelector('canvas');
          if (canvas) {
            observer.disconnect();
            requestAnimationFrame(() => canvas.classList.add('ready'));
          }
        });
        observer.observe(stage, { childList: true, subtree: true });
      });
      (window.requestIdleCallback || setTimeout)(mount);
    </script>
